<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        table {
            border-collapse: collapse;
            width: 80%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        th {
            background: #f4f4f4;
        }
    </style>
</head>
<body>

<h1>E-Commerce Products</h1>

<table id="products">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price (£)</th>
            <th>Quantity</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
fetch('/products')
.then(response => response.json())
.then(data => {
    const tbody = document.querySelector('#products tbody');

    data.forEach(product => {
        tbody.innerHTML += `
            <tr>
                <td>${product.id}</td>
                <td>${product.name}</td>
                <td>${product.price}</td>
                <td>${product.quantity}</td>
            </tr>
        `;
    });
});
</script>

</body>
</html>
