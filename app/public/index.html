<!DOCTYPE html>
<html>
<head>
<title>E-Commerce Store</title>
<style>
body {
    font-family: Arial;
    margin: 40px;
}
table {
    border-collapse: collapse;
    width: 80%;
}
th, td {
    border: 1px solid black;
    padding: 10px;
}
</style>
</head>
<body>

<h1>Products</h1>

<table id="products">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Quantity</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
fetch('/products')
.then(res => res.json())
.then(data => {
  const tbody = document.querySelector('tbody');

  data.forEach(product => {
    tbody.innerHTML += `
      <tr>
        <td>${product.id}</td>
        <td>${product.name}</td>
        <td>${product.price}</td>
        <td>${product.quantity}</td>
      </tr>
    `;
  });
});
</script>

</body>
</html>
